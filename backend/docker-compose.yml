services:
  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: postgres_db
      PGDATA: /var/lib/postgresql/
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/

volumes:
  pgdata:
    driver: local
